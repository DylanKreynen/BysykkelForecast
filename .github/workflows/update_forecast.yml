name: Update 9-day forecast

on:
  schedule:
    - cron: "0 2 * * *"    # 04:00 Oslo (CEST) / 03:00 (CET)
  workflow_dispatch:        # allow manual runs from the GitHub Actions tab

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install --quiet -r dashboard/requirements.txt

      - name: Run forecast script
        run: python dashboard/bysykkel_forecast.py
        env:
          MET_USER_AGENT: ${{ secrets.MET_USER_AGENT }}

      - name: Commit new forecast CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/forecasts/
          git diff --staged --quiet || \
            git commit -m "chore: update 9-day forecast $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
